<!DOCTYPE html>
<html>
<head>

<title>PhotoSpot Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">PhotoSpot</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav me-auto">

<a class="nav-link" href="/spots">Spots</a>

</ul>


<!-- SEARCH BAR -->
<form class="d-flex me-3" action="/search" method="GET">
<input class="form-control me-2" type="search" name="query" placeholder="Search spots">
<button class="btn btn-outline-light">Search</button>
</form>


<ul class="navbar-nav">

<!-- ADMIN MENU -->
{% if session.get("role") == "admin" %}

<li class="nav-item">
<a class="nav-link" href="/add_spot">Add Spot</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/admin">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logout">Logout</a>
</li>

{% else %}

<!-- USER LOGGED IN -->
{% if session.get("username") %}

<li class="nav-item">
<a class="nav-link" href="/profile">Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logout">Logout</a>
</li>

{% else %}

<!-- NOT LOGGED IN -->
<li class="nav-item">
<a class="nav-link" href="/login">Login</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/register">Register</a>
</li>

{% endif %}

{% endif %}

</ul>

</div>

</div>
</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
