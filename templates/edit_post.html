{% extends "base.html" %}
{% block title %}Edit Spot — Photospot{% endblock %}
{% block content %}

<div class="container mt-5" style="max-width: 600px;">

    <h1 class="mb-3">Edit spot</h1>

    <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST" enctype="multipart/form-data">

        <!-- Existing photos -->
        {% if images %}
        <div class="mb-3">
            <label class="form-label">Current photos</label>
            <div class="d-flex flex-wrap gap-2">
                {% for img in images %}
                <div class="position-relative">
                    <img src="{{ url_for('static', filename='images/spots/' ~ img.filename) }}"
                         style="width:90px; height:90px; object-fit:cover; border-radius:6px;">
                    <div class="form-check mt-1">
                        <input class="form-check-input" type="checkbox"
                               name="delete_image" value="{{ img.id }}" id="del{{ img.id }}">
                        <label class="form-check-label small text-danger" for="del{{ img.id }}">Remove</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <!-- Add new photos -->
        <div class="mb-3">
            <label class="form-label">Add photos</label>
            <input type="file" name="photos" multiple accept="image/*" class="form-control">
            <small class="text-muted">JPG, PNG, WEBP</small>
        </div>

        <!-- Title -->
        <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" name="name" class="form-control"
                   value="{{ post.name }}" required>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label class="form-label">Location (optional)</label>
            <input type="text" name="location" class="form-control"
                   value="{{ post.location or '' }}">
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description (optional)</label>
            <textarea name="description" rows="3" class="form-control">{{ post.description or '' }}</textarea>
        </div>

        <!-- Star rating (CSS only) -->
        <div class="mb-4">
            <label class="form-label">Your rating (optional)</label>
            <div class="star-rating">
                {% for i in range(1, 6) %}
                <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" {% if post and post.rating and
                    post.rating==i %}checked{% endif %}>
                <label for="star{{ i }}">&#9733;</label>
                {% endfor %}
            </div>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-dark">Save changes</button>
            <a href="{{ url_for('spot_detail', spot_id=post.id) }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>

    <!-- Delete -->
    <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" class="mt-3">
        <button type="submit" class="btn btn-danger w-100"
            onclick="return confirm('Delete this post? This cannot be undone.');">
            Delete post
        </button>
    </form>

</div>

{% endblock %}
