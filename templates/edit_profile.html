{% extends "base.html" %}
{% block content %}

<div class="ep-wrap">
  <h1 class="ep-title">Edit profile</h1>

  <form action="{{ url_for('edit_profile') }}" method="POST" enctype="multipart/form-data">

    <div class="ep-field">
      <label>Profile photo</label>
      {% if user.profile_photo and user.profile_photo != 'default.jpg' %}
        <img class="ep-current-photo"
             src="{{ url_for('static', filename='images/profiles/' ~ user.profile_photo) }}"
             alt="current photo">
      {% endif %}
      <input type="file" name="profile_photo" accept="image/*">
    </div>

    <div class="ep-field">
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" rows="3" placeholder="Tell people about yourself...">{{ user.bio or '' }}</textarea>
    </div>

    <div class="ep-field">
      <label for="instagram">Instagram handle</label>
      <input type="text" id="instagram" name="instagram"
             placeholder="username (no @)"
             value="{{ user.instagram or '' }}">
    </div>

    <button type="submit" class="ep-btn">Save changes</button>
    <a href="{{ url_for('profile', user_id=session['user_id']) }}" class="ep-cancel">Cancel</a>

  </form>
</div>


{% endblock %}
